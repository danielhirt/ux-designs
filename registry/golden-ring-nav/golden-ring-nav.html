<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Ring Navigation</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #09090b;
            --toolbar-bg: rgba(20, 20, 24, 0.82);
            --toolbar-border: rgba(255, 255, 255, 0.06);
            --plate-bg: rgba(20, 20, 24, 0.96);
            --icon-idle: rgba(255, 255, 255, 0.32);
            --icon-active: rgba(255, 255, 255, 0.92);
            --divider: rgba(255, 255, 255, 0.04);
            --scale: 1;
        }

        [data-theme="light"] {
            --bg: #f5f5f7;
            --toolbar-bg: rgba(255, 255, 255, 0.72);
            --toolbar-border: rgba(0, 0, 0, 0.06);
            --plate-bg: rgba(255, 255, 255, 0.94);
            --icon-idle: rgba(0, 0, 0, 0.28);
            --icon-active: rgba(0, 0, 0, 0.88);
            --divider: rgba(0, 0, 0, 0.04);
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            transition: background 0.5s ease;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }

        /* ── Scale wrapper (for recording) ── */
        .scale-wrapper {
            transform: scale(var(--scale));
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* ── Toolbar ── */
        .toolbar {
            position: relative;
            display: flex;
            align-items: center;
            padding: 8px;
            background: var(--toolbar-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--toolbar-border);
            border-radius: 24px;
            box-shadow:
                0 1px 2px rgba(0, 0, 0, 0.2),
                0 8px 24px rgba(0, 0, 0, 0.35);
        }

        [data-theme="light"] .toolbar {
            box-shadow:
                0 1px 2px rgba(0, 0, 0, 0.04),
                0 8px 24px rgba(0, 0, 0, 0.08);
        }

        /* ── Golden Ring Indicator ── */
        .indicator {
            position: absolute;
            z-index: 1;
            pointer-events: none;
            transition:
                left 0.5s cubic-bezier(0.34, 1.2, 0.64, 1),
                width 0.5s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        /* Soft ambient glow behind the ring — contained to indicator only */
        .indicator-glow {
            position: absolute;
            inset: -8px;
            background: radial-gradient(ellipse, rgba(232, 175, 72, 0.18) 0%, transparent 70%);
            border-radius: 28px;
        }

        [data-theme="light"] .indicator-glow {
            background: radial-gradient(ellipse, rgba(200, 155, 50, 0.22) 0%, transparent 70%);
        }

        /* Clip container for spinning ring */
        .ring-clip {
            position: absolute;
            inset: 0;
            overflow: hidden;
            border-radius: 18px;
        }

        .spinning-ring {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: conic-gradient(
                from 0deg,
                #42280f 0%,
                #b8883c 10%,
                #e8c96a 18%,
                #feeaa5 22%,
                #e8c96a 26%,
                #b8883c 34%,
                #42280f 42%,
                #fff 44%,
                #ffd6e0 46%,
                #c8e0f4 48%,
                #fff 50%,
                #42280f 52%,
                #b8883c 60%,
                #e8c96a 68%,
                #feeaa5 72%,
                #e8c96a 76%,
                #b8883c 84%,
                #42280f 92%,
                #fff 94%,
                #ffd6e0 96%,
                #c8e0f4 98%,
                #42280f 100%
            );
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Inner plate that masks center of ring */
        .inner-plate {
            position: absolute;
            inset: 2px;
            background: var(--plate-bg);
            border-radius: 16px;
            transition: background 0.5s ease;
        }

        /* ── Nav Buttons ── */
        .nav-btn {
            position: relative;
            z-index: 2;
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
            color: var(--icon-idle);
            cursor: pointer;
            transition: color 0.3s ease;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .nav-btn:hover { color: var(--icon-active); }
        .nav-btn.active { color: var(--icon-active); }

        .nav-btn svg {
            width: 22px;
            height: 22px;
            stroke-width: 1.5;
            fill: none;
            stroke: currentColor;
        }

        .divider {
            width: 1px;
            height: 22px;
            background: var(--divider);
            margin: 0 2px;
            flex-shrink: 0;
        }

        /* ── Theme Toggle ── */
        .theme-toggle {
            position: relative;
            z-index: 2;
            width: 52px;
            height: 52px;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--icon-idle);
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .theme-toggle:hover { color: var(--icon-active); }

        .theme-toggle svg {
            position: absolute;
            width: 22px;
            height: 22px;
            stroke-width: 1.5;
            fill: none;
            stroke: currentColor;
            transition:
                transform 0.55s cubic-bezier(0.34, 1.56, 0.64, 1),
                opacity 0.35s ease;
        }

        .icon-sun  { opacity: 0; transform: rotate(-90deg) scale(0.5); }
        .icon-moon { opacity: 1; transform: rotate(0deg) scale(1); }

        [data-theme="light"] .icon-sun  { opacity: 1; transform: rotate(0deg) scale(1); }
        [data-theme="light"] .icon-moon { opacity: 0; transform: rotate(90deg) scale(0.5); }


        /* ── Hint Bar ── */
        .hints {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 16px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 11px;
            letter-spacing: 0.02em;
            pointer-events: none;
            user-select: none;
        }

        [data-theme="light"] .hints { color: rgba(0, 0, 0, 0.25); }

        .hints kbd {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.04);
            font-family: inherit;
            font-size: 11px;
            margin: 0 2px;
        }

        [data-theme="light"] .hints kbd {
            border-color: rgba(0, 0, 0, 0.08);
            background: rgba(0, 0, 0, 0.03);
        }
    </style>
</head>
<body>

    <div class="scale-wrapper" id="scaleWrapper">
        <nav class="toolbar" id="toolbar">
            <!-- Golden ring indicator -->
            <div class="indicator" id="indicator">
                <div class="indicator-glow"></div>
                <div class="ring-clip">
                    <div class="spinning-ring"></div>
                </div>
                <div class="inner-plate"></div>
            </div>

            <!-- Navigation buttons -->
            <button class="nav-btn active" data-index="0" aria-label="Home">
                <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            </button>

            <div class="divider"></div>

            <button class="nav-btn" data-index="1" aria-label="Search">
                <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </button>

            <div class="divider"></div>

            <button class="nav-btn" data-index="2" aria-label="Profile">
                <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            </button>

            <div class="divider"></div>

            <!-- Theme toggle -->
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                <svg class="icon-sun" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                <svg class="icon-moon" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
            </button>
        </nav>
    </div>

    <div class="hints">
        <span><kbd>R</kbd> 2× scale</span>
    </div>

    <script>
        const indicator = document.getElementById('indicator');
        const navBtns = document.querySelectorAll('.nav-btn');
        let scaled = false;

        function moveIndicator(btn) {
            indicator.style.width = btn.offsetWidth + 'px';
            indicator.style.height = btn.offsetHeight + 'px';
            indicator.style.left = btn.offsetLeft + 'px';
            indicator.style.top = btn.offsetTop + 'px';
        }

        function setActive(btn) {
            navBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            moveIndicator(btn);
        }

        navBtns.forEach(btn => {
            btn.addEventListener('click', () => setActive(btn));
        });

        document.getElementById('themeToggle').addEventListener('click', () => {
            const html = document.documentElement;
            html.dataset.theme = html.dataset.theme === 'dark' ? 'light' : 'dark';
        });

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'r') {
                scaled = !scaled;
                document.documentElement.style.setProperty('--scale', scaled ? '2' : '1');
            }
        });

        // Position indicator on load
        window.addEventListener('load', () => {
            moveIndicator(document.querySelector('.nav-btn.active'));
        });

        // Reposition on resize
        window.addEventListener('resize', () => {
            const active = document.querySelector('.nav-btn.active');
            if (active) moveIndicator(active);
        });
    </script>
</body>
</html>

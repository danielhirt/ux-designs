<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Ring Navigation - Record Mode</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #08080a;
            --toolbar-bg: rgba(22, 22, 26, 0.75);
            --toolbar-border: rgba(255, 255, 255, 0.08);
            --toolbar-shadow: rgba(0, 0, 0, 0.5);
            --plate-bg: rgba(22, 22, 26, 0.95);
            --icon-color: rgba(255, 255, 255, 0.4);
            --icon-active: rgba(255, 255, 255, 0.9);
            --divider: rgba(255, 255, 255, 0.05);
            --glow: rgba(232, 175, 72, 0.15);
            --record-scale: 1;
        }

        [data-theme="light"] {
            --bg: #f4f4f6;
            --toolbar-bg: rgba(255, 255, 255, 0.65);
            --toolbar-border: rgba(0, 0, 0, 0.08);
            --toolbar-shadow: rgba(0, 0, 0, 0.1);
            --plate-bg: rgba(255, 255, 255, 0.9);
            --icon-color: rgba(0, 0, 0, 0.35);
            --icon-active: rgba(0, 0, 0, 0.85);
            --divider: rgba(0, 0, 0, 0.05);
            --glow: rgba(232, 175, 72, 0.2);
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            transition: background 0.6s ease;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* ── Ambient Glow ── */
        .ambient-glow {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, rgba(232, 175, 72, 0.03) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Film Grain Noise (Can be toggled off) ── */
        .grain {
            position: fixed;
            inset: -100%;
            width: 300%;
            height: 300%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04;
            pointer-events: none;
            z-index: 100;
            animation: grain 8s steps(10) infinite;
        }

        .grain.hidden { display: none; }

        @keyframes grain {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-5%, -5%); }
            20% { transform: translate(-10%, 5%); }
            50% { transform: translate(-5%, 15%); }
            80% { transform: translate(-15%, 0); }
        }

        /* ── Toolbar Wrapper for Scaling ── */
        .wrapper {
            transform: scale(var(--record-scale));
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Toolbar ── */
        .toolbar {
            position: relative;
            display: flex;
            align-items: center;
            padding: 8px;
            background: var(--toolbar-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--toolbar-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px var(--toolbar-shadow);
            z-index: 10;
        }

        /* ── Golden Indicator ── */
        .indicator-container {
            position: absolute;
            z-index: 1;
            transition: left 0.5s cubic-bezier(0.34, 1.2, 0.64, 1);
            pointer-events: none;
        }

        .glow {
            position: absolute;
            inset: -6px;
            background: #e8af48;
            opacity: 0.15;
            filter: blur(12px);
            border-radius: 24px;
        }

        .clip-container {
            position: absolute;
            inset: 0;
            overflow: hidden;
            border-radius: 18px;
        }

        .spinning-ring {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: conic-gradient(
                from 0deg,
                #533517 0%,
                #c49746 12%,
                #feeaa5 20%,
                #c49746 28%,
                #533517 35%,
                #ffffff 36%,
                #ffffff 39%,
                #ffc0cb 40.5%,
                #add8e6 42%,
                #ffffff 43.5%,
                #ffffff 46.5%,
                #533517 48%,
                #533517 50%,
                #c49746 62%,
                #feeaa5 70%,
                #c49746 78%,
                #533517 85%,
                #ffffff 86%,
                #ffffff 89%,
                #ffc0cb 90.5%,
                #add8e6 92%,
                #ffffff 93.5%,
                #ffffff 96.5%,
                #533517 98%,
                #533517 100%
            );
            animation: rotate 4.5s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .inner-plate {
            position: absolute;
            inset: 2px;
            background: var(--plate-bg);
            border-radius: 16px;
            transition: background 0.6s ease;
        }

        /* ── Buttons ── */
        .nav-btn {
            position: relative;
            z-index: 2;
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
            color: var(--icon-color);
            cursor: pointer;
            transition: color 0.3s ease;
            outline: none;
        }

        .nav-btn.active { color: var(--icon-active); }
        .nav-btn svg { width: 22px; height: 22px; stroke-width: 1.5; }

        .divider {
            width: 1px;
            height: 24px;
            background: var(--divider);
            margin: 0 4px;
        }

        /* ── Theme Toggle ── */
        .theme-toggle {
            position: relative;
            width: 52px;
            height: 52px;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--icon-color);
        }

        .theme-toggle svg {
            position: absolute;
            width: 22px;
            height: 22px;
            stroke-width: 1.5;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
        }

        .icon-sun { opacity: 0; transform: rotate(-90deg) scale(0.5); }
        .icon-moon { opacity: 1; transform: rotate(0) scale(1); }

        [data-theme="light"] .icon-sun { opacity: 1; transform: rotate(0) scale(1); }
        [data-theme="light"] .icon-moon { opacity: 0; transform: rotate(90deg) scale(0.5); }

        .theme-toggle.clicked { animation: bounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }

        @keyframes bounce {
            0% { transform: scale(1); }
            50% { transform: scale(1.25); }
            100% { transform: scale(1); }
        }

        /* ── Record Controls Tooltip ── */
        .controls-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.4);
            color: rgba(255,255,255,0.5);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.1);
        }

    </style>
</head>
<body>
    <div class="grain" id="grain"></div>
    <div class="ambient-glow"></div>

    <div class="wrapper" id="wrapper">
        <nav class="toolbar" id="toolbar">
            <div class="indicator-container" id="indicator">
                <div class="glow"></div>
                <div class="clip-container">
                    <div class="spinning-ring"></div>
                </div>
                <div class="inner-plate"></div>
            </div>

            <button class="nav-btn active" onclick="setActive(this, 0)" aria-label="Home">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
            </button>
            <div class="divider"></div>
            <button class="nav-btn" onclick="setActive(this, 1)" aria-label="Search">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
            </button>
            <div class="divider"></div>
            <button class="nav-btn" onclick="setActive(this, 2)" aria-label="User">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
            </button>
            <div class="divider"></div>
            <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
                <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
            </button>
        </nav>
    </div>

    <div class="controls-hint">Press <b>'G'</b> to toggle Grain (for record) &bull; Press <b>'R'</b> to toggle 2x Scale</div>

    <script>
        const indicator = document.getElementById('indicator');
        const themeBtn = document.getElementById('theme-toggle');
        const grain = document.getElementById('grain');
        const wrapper = document.getElementById('wrapper');
        let isScaled = false;
        
        function setActive(btn, index) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            indicator.style.width = btn.offsetWidth + 'px';
            indicator.style.height = btn.offsetHeight + 'px';
            indicator.style.left = btn.offsetLeft + 'px';
            indicator.style.top = btn.offsetTop + 'px';
        }

        function toggleTheme() {
            const html = document.documentElement;
            html.setAttribute('data-theme', html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
            themeBtn.classList.remove('clicked');
            void themeBtn.offsetWidth;
            themeBtn.classList.add('clicked');
        }

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'g') {
                grain.classList.toggle('hidden');
            }
            if (e.key.toLowerCase() === 'r') {
                isScaled = !isScaled;
                document.documentElement.style.setProperty('--record-scale', isScaled ? '2' : '1');
            }
        });

        window.onload = () => { setActive(document.querySelector('.nav-btn.active'), 0); };
    </script>
</body>
</html>

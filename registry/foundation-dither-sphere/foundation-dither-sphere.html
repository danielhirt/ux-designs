<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foundation Dither Sphere</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { margin: 0; overflow: hidden; background: #08060a; }
    canvas { width: 100vw; height: 100vh; display: block; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;

    let w = canvas.width;
    let h = canvas.height;

    // 8x8 Bayer threshold matrix (normalized to 0-1)
    const BAYER = [
      0,32,8,40,2,34,10,42,
      48,16,56,24,50,18,58,26,
      12,44,4,36,14,46,6,38,
      60,28,52,20,62,30,54,22,
      3,35,11,43,1,33,9,41,
      51,19,59,27,49,17,57,25,
      15,47,7,39,13,45,5,37,
      63,31,55,23,61,29,53,21
    ].map(v => v / 64);

    function getBayerThresholdSmooth(x, y, offset) {
      const sx = x + offset;
      const fx = Math.floor(sx);
      const frac = sx - fx;
      const t0 = BAYER[((y & 7) << 3) + (fx & 7)];
      const t1 = BAYER[((y & 7) << 3) + ((fx + 1) & 7)];
      return t0 + (t1 - t0) * frac;
    }

    // Reusable ImageData buffer
    let imageData = ctx.createImageData(w, h);

    function setPixel(data, x, y, r, g, b, a) {
      const i = (y * w + x) * 4;
      data[i]     = r;
      data[i + 1] = g;
      data[i + 2] = b;
      data[i + 3] = a * 255;
    }

    function smoothstep(edge0, edge1, x) {
      const t = Math.max(0, Math.min(1, (x - edge0) / (edge1 - edge0)));
      return t * t * (3 - 2 * t);
    }

    function clamp(v, lo, hi) {
      return v < lo ? lo : v > hi ? hi : v;
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    // --- Background glow ---
    function renderGlow(ctx, cx, cy, radius) {
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius * 2.2);
      grad.addColorStop(0, 'rgba(180, 120, 40, 0.06)');
      grad.addColorStop(0.5, 'rgba(180, 120, 40, 0.02)');
      grad.addColorStop(1, 'rgba(180, 120, 40, 0)');
      ctx.fillStyle = grad;
      ctx.fillRect(cx - radius * 2.2, cy - radius * 2.2, radius * 4.4, radius * 4.4);
    }

    // --- Data streams ---
    const STREAM_COUNT = 6;
    const PARTICLES_PER_STREAM = 60;

    function initStreams(cx, cy, sphereRadius, canvasSize) {
      const streams = [];
      const maxRadius = Math.max(canvasSize.w, canvasSize.h) * 0.5;
      for (let s = 0; s < STREAM_COUNT; s++) {
        const baseAngle = (s / STREAM_COUNT) * Math.PI * 2;
        const particles = [];
        for (let p = 0; p < PARTICLES_PER_STREAM; p++) {
          particles.push({ t: p / PARTICLES_PER_STREAM });
        }
        streams.push({ baseAngle, particles, maxRadius });
      }
      return streams;
    }

    function getStreamParticlePos(stream, t, cx, cy, sphereRadius) {
      const r = stream.maxRadius * (1 - t) + sphereRadius * t;
      const angle = stream.baseAngle + t * Math.PI * 2.5;
      return { x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r, t };
    }

    function renderStreams(imageData, streams, cx, cy, sphereRadius, crawlOffset) {
      const data = imageData.data;
      for (let s = 0; s < streams.length; s++) {
        const stream = streams[s];
        for (let p = 0; p < stream.particles.length; p++) {
          const t = stream.particles[p].t;
          const pos = getStreamParticlePos(stream, t, cx, cy, sphereRadius);

          // 2x2 pixel block — skip if any corner is out of bounds
          if (pos.x < 0 || pos.x + 1 >= w || pos.y < 0 || pos.y + 1 >= h) continue;

          // Two-segment color lerp: blue → cold accent → amber
          let r, g, b;
          if (t < 0.5) {
            const lt = t / 0.5;
            r = Math.round(lerp(70, 100, lt));
            g = Math.round(lerp(130, 160, lt));
            b = Math.round(lerp(255, 220, lt));
          } else {
            const lt = (t - 0.5) / 0.5;
            r = Math.round(lerp(100, 220, lt));
            g = Math.round(lerp(160, 170, lt));
            b = Math.round(lerp(220, 60, lt));
          }

          const lum = 0.3 + t * 0.4;

          // Render 2x2 block with Bayer dithering
          const px = Math.floor(pos.x);
          const py = Math.floor(pos.y);
          for (let dy = 0; dy < 2; dy++) {
            for (let dx = 0; dx < 2; dx++) {
              const sx = px + dx;
              const sy = py + dy;
              const threshold = getBayerThresholdSmooth(sx, sy, crawlOffset);
              if (lum > threshold) {
                setPixel(data, sx, sy, r, g, b, 0.8);
              }
            }
          }
        }
      }
    }

    // Initialize streams at module scope
    let streams = initStreams(w / 2, h / 2, Math.min(w, h) * 0.2, { w, h });

    // --- Floating mathematical notation ---
    const SYMBOLS = ['\u2211', '\u03C8', '\u2202', '\u222B', '\u03A9', '\u2207', '\u03C0', '\u03BB'];

    function initNotation(w, h, cx, cy, sphereRadius) {
      return SYMBOLS.map((char, i) => {
        const angle = (i / SYMBOLS.length) * Math.PI * 2 + 0.4;
        const dist = sphereRadius * 2 + Math.random() * sphereRadius;
        return {
          char,
          x: cx + Math.cos(angle) * dist,
          y: cy + Math.sin(angle) * dist,
          vx: (Math.random() - 0.5) * 0.5,
          vy: (Math.random() - 0.5) * 0.5,
          fadePeriod: 15 + Math.random() * 15,
          fadeOffset: Math.random() * Math.PI * 2,
          isBlue: i % 3 === 0
        };
      });
    }

    let notation = initNotation(w, h, w / 2, h / 2, Math.min(w, h) * 0.2);

    function renderNotation(ctx, notation, time, dt) {
      const t = time / 1000;
      ctx.font = '14px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const ncx = w / 2, ncy = h / 2;
      const maxDrift = Math.min(w, h) * 0.4;
      for (const sym of notation) {
        sym.x += sym.vx * dt;
        sym.y += sym.vy * dt;
        // Soft boundary: reverse velocity if drifting too far from center
        const ddx = sym.x - ncx, ddy = sym.y - ncy;
        if (ddx * ddx + ddy * ddy > maxDrift * maxDrift) {
          sym.vx = -Math.abs(sym.vx) * Math.sign(ddx);
          sym.vy = -Math.abs(sym.vy) * Math.sign(ddy);
        }
        const opacity = (Math.sin(t * Math.PI * 2 / sym.fadePeriod + sym.fadeOffset) * 0.5 + 0.5) * 0.12;
        const color = sym.isBlue ? '70, 130, 255' : '220, 170, 60';
        ctx.fillStyle = `rgba(${color}, ${opacity})`;
        ctx.fillText(sym.char, sym.x, sym.y);
      }
    }

    function renderSphere(imageData, cx, cy, radius, crawlOffset) {
      const data = imageData.data;
      const x0 = Math.max(0, Math.floor(cx - radius));
      const x1 = Math.min(w - 1, Math.ceil(cx + radius));
      const y0 = Math.max(0, Math.floor(cy - radius));
      const y1 = Math.min(h - 1, Math.ceil(cy + radius));

      for (let y = y0; y <= y1; y++) {
        for (let x = x0; x <= x1; x++) {
          const dx = x - cx;
          const dy = y - cy;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist > radius) continue;

          const distRatio = dist / radius;

          // 3D surface normal
          const nx = dx / radius;
          const ny = dy / radius;
          const nz = Math.sqrt(Math.max(0, 1 - nx * nx - ny * ny));

          // Diffuse lighting (light from upper-left)
          const diffuse = Math.max(0, nx * -0.4 + ny * -0.5 + nz * 0.75);

          // Specular: simplified Blinn-Phong
          const spec = Math.pow(Math.max(0, nz * 0.8 + nx * -0.3 + ny * -0.3), 40) * 0.6;

          // Luminance
          let lum = clamp(diffuse * 0.65 + spec * 0.5, 0, 1);

          // Smooth edge falloff
          const edge = smoothstep(0.85, 1.0, distRatio);
          lum *= (1 - edge);

          // Bayer dithering with smooth crawl offset
          const threshold = getBayerThresholdSmooth(x, y, crawlOffset);

          if (lum <= threshold) continue;

          // Color: amber core with blue sine-wave blend
          const blueMix = Math.max(0, Math.sin(distRatio * Math.PI * 1.5)) * 0.25;
          const r = Math.round(lerp(220, 70, blueMix));
          const g = Math.round(lerp(170, 130, blueMix));
          const b = Math.round(lerp(60, 255, blueMix));

          // Alpha
          const a = 0.6 + lum * 0.4;

          setPixel(data, x, y, r, g, b, a);
        }
      }
    }

    // --- Prefers-reduced-motion support ---
    const motionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
    let reduceMotion = motionQuery.matches;
    motionQuery.addEventListener('change', (e) => {
      reduceMotion = e.matches;
      if (!reduceMotion) {
        lastTime = 0;
        requestAnimationFrame(render);
      }
    });

    // --- Debounced resize handler ---
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(handleResize, 200);
    });

    function handleResize() {
      const newW = canvas.clientWidth;
      const newH = canvas.clientHeight;
      canvas.width = newW;
      canvas.height = newH;
      imageData = ctx.createImageData(newW, newH);

      const cx = newW / 2;
      const cy = newH / 2;
      const newMaxRadius = Math.max(newW, newH) * 0.5;

      // Update stream geometry WITHOUT resetting particle t values
      for (const stream of streams) {
        stream.maxRadius = newMaxRadius;
      }

      // Rescale notation positions proportionally
      const oldCx = w / 2;
      const oldCy = h / 2;
      for (const sym of notation) {
        sym.x = cx + (sym.x - oldCx) * (newW / w);
        sym.y = cy + (sym.y - oldCy) * (newH / h);
      }

      // Update stored dimensions
      w = newW;
      h = newH;

      // If in reduced-motion mode, re-render the static frame at new size
      if (reduceMotion) {
        lastTime = 0;
        render(0);
      }
    }

    let lastTime = 0;

    function render(time) {
      // Delta time tracking (capped at 100ms to prevent spikes after tab backgrounding)
      const deltaTime = lastTime === 0 ? 0 : Math.min((time - lastTime) / 1000, 0.1);
      lastTime = time;

      // Skip frame if canvas resized but debounce hasn't fired yet
      if (canvas.width !== w || canvas.height !== h) {
        if (!reduceMotion) requestAnimationFrame(render);
        return;
      }

      const t = time / 1000;
      const data = imageData.data;

      // Fill background (8, 6, 10) fully opaque
      for (let i = 0; i < data.length; i += 4) {
        data[i]     = 8;
        data[i + 1] = 6;
        data[i + 2] = 10;
        data[i + 3] = 255;
      }

      const cx = w / 2;
      const cy = h / 2;
      const baseRadius = Math.min(w, h) * 0.2;

      // Breathing animation: +/-2.5% over 8s cycle
      const breathingRadius = baseRadius * (1 + Math.sin(t * Math.PI * 2 / 8) * 0.025);

      // Smooth dither crawl: 0.0 to 8.0 over 12 seconds
      const crawlOffset = (t % 12) / 12 * 8;

      // Advance stream particles
      for (const stream of streams) {
        for (const particle of stream.particles) {
          particle.t += deltaTime / 17;
          if (particle.t >= 1) particle.t -= 1;
        }
      }

      renderSphere(imageData, cx, cy, breathingRadius, crawlOffset);
      renderStreams(imageData, streams, cx, cy, breathingRadius, crawlOffset);

      ctx.putImageData(imageData, 0, 0);

      // Background glow (composited on top via 'lighter')
      ctx.globalCompositeOperation = 'lighter';
      renderGlow(ctx, cx, cy, breathingRadius);
      ctx.globalCompositeOperation = 'source-over';

      // Floating notation (drawn after glow, on top)
      renderNotation(ctx, notation, time, deltaTime);

      if (!reduceMotion) {
        requestAnimationFrame(render);
      }
    }

    requestAnimationFrame(render);
  </script>
</body>
</html>

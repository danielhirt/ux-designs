<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foundation Dither Sphere</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { margin: 0; overflow: hidden; background: #08060a; }
    canvas { width: 100vw; height: 100vh; display: block; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;

    let w = canvas.width;
    let h = canvas.height;

    // 8x8 Bayer threshold matrix (normalized to 0-1)
    const BAYER = [
      0,32,8,40,2,34,10,42,
      48,16,56,24,50,18,58,26,
      12,44,4,36,14,46,6,38,
      60,28,52,20,62,30,54,22,
      3,35,11,43,1,33,9,41,
      51,19,59,27,49,17,57,25,
      15,47,7,39,13,45,5,37,
      63,31,55,23,61,29,53,21
    ].map(v => v / 64);

    function getBayerThreshold(x, y) {
      return BAYER[((y & 7) << 3) + (x & 7)];
    }

    // Reusable ImageData buffer
    let imageData = ctx.createImageData(w, h);

    function setPixel(data, x, y, r, g, b, a) {
      const i = (y * w + x) * 4;
      data[i]     = r;
      data[i + 1] = g;
      data[i + 2] = b;
      data[i + 3] = a * 255;
    }

    function smoothstep(edge0, edge1, x) {
      const t = Math.max(0, Math.min(1, (x - edge0) / (edge1 - edge0)));
      return t * t * (3 - 2 * t);
    }

    function clamp(v, lo, hi) {
      return v < lo ? lo : v > hi ? hi : v;
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    // --- Background glow ---
    function renderGlow(ctx, cx, cy, radius) {
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius * 2.2);
      grad.addColorStop(0, 'rgba(180, 120, 40, 0.06)');
      grad.addColorStop(0.5, 'rgba(180, 120, 40, 0.02)');
      grad.addColorStop(1, 'rgba(180, 120, 40, 0)');
      ctx.fillStyle = grad;
      ctx.fillRect(cx - radius * 2.2, cy - radius * 2.2, radius * 4.4, radius * 4.4);
    }

    // --- Data streams ---
    const STREAM_COUNT = 6;
    const PARTICLES_PER_STREAM = 60;

    function initStreams(cx, cy, sphereRadius, canvasSize) {
      const streams = [];
      const maxRadius = Math.max(canvasSize.w, canvasSize.h) * 0.5;
      for (let s = 0; s < STREAM_COUNT; s++) {
        const baseAngle = (s / STREAM_COUNT) * Math.PI * 2;
        const particles = [];
        for (let p = 0; p < PARTICLES_PER_STREAM; p++) {
          particles.push({ t: p / PARTICLES_PER_STREAM });
        }
        streams.push({ baseAngle, particles, maxRadius });
      }
      return streams;
    }

    function getStreamParticlePos(stream, t, cx, cy, sphereRadius) {
      const r = stream.maxRadius * (1 - t) + sphereRadius * t;
      const angle = stream.baseAngle + t * Math.PI * 2.5;
      return { x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r, t };
    }

    function renderStreams(imageData, streams, cx, cy, sphereRadius, crawlOffset) {
      const data = imageData.data;
      for (let s = 0; s < streams.length; s++) {
        const stream = streams[s];
        for (let p = 0; p < stream.particles.length; p++) {
          const t = stream.particles[p].t;
          const pos = getStreamParticlePos(stream, t, cx, cy, sphereRadius);

          // 2x2 pixel block — skip if any corner is out of bounds
          if (pos.x < 0 || pos.x + 1 >= w || pos.y < 0 || pos.y + 1 >= h) continue;

          // Two-segment color lerp: blue → cold accent → amber
          let r, g, b;
          if (t < 0.5) {
            const lt = t / 0.5;
            r = Math.round(lerp(70, 100, lt));
            g = Math.round(lerp(130, 160, lt));
            b = Math.round(lerp(255, 220, lt));
          } else {
            const lt = (t - 0.5) / 0.5;
            r = Math.round(lerp(100, 220, lt));
            g = Math.round(lerp(160, 170, lt));
            b = Math.round(lerp(220, 60, lt));
          }

          const lum = 0.3 + t * 0.4;

          // Render 2x2 block with Bayer dithering
          const px = Math.floor(pos.x);
          const py = Math.floor(pos.y);
          for (let dy = 0; dy < 2; dy++) {
            for (let dx = 0; dx < 2; dx++) {
              const sx = px + dx;
              const sy = py + dy;
              const bx = sx + (crawlOffset & 7);
              const by = sy + ((crawlOffset >> 3) & 7);
              const threshold = getBayerThreshold(bx, by);
              if (lum > threshold) {
                setPixel(data, sx, sy, r, g, b, 0.8);
              }
            }
          }
        }
      }
    }

    // Initialize streams at module scope
    let streams = initStreams(w / 2, h / 2, Math.min(w, h) * 0.2, { w, h });

    function renderSphere(imageData, cx, cy, radius, crawlOffset) {
      const data = imageData.data;
      const x0 = Math.max(0, Math.floor(cx - radius));
      const x1 = Math.min(w - 1, Math.ceil(cx + radius));
      const y0 = Math.max(0, Math.floor(cy - radius));
      const y1 = Math.min(h - 1, Math.ceil(cy + radius));

      for (let y = y0; y <= y1; y++) {
        for (let x = x0; x <= x1; x++) {
          const dx = x - cx;
          const dy = y - cy;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist > radius) continue;

          const distRatio = dist / radius;

          // 3D surface normal
          const nx = dx / radius;
          const ny = dy / radius;
          const nz = Math.sqrt(Math.max(0, 1 - nx * nx - ny * ny));

          // Diffuse lighting (light from upper-left)
          const diffuse = Math.max(0, nx * -0.4 + ny * -0.5 + nz * 0.75);

          // Specular: simplified Blinn-Phong
          const spec = Math.pow(Math.max(0, nz * 0.8 + nx * -0.3 + ny * -0.3), 40) * 0.6;

          // Luminance
          let lum = clamp(diffuse * 0.65 + spec * 0.5, 0, 1);

          // Smooth edge falloff
          const edge = smoothstep(0.85, 1.0, distRatio);
          lum *= (1 - edge);

          // Bayer dithering with crawl offset
          const bx = x + (crawlOffset & 7);
          const by = y + ((crawlOffset >> 3) & 7);
          const threshold = getBayerThreshold(bx, by);

          if (lum <= threshold) continue;

          // Color: amber core with blue sine-wave blend
          const blueMix = Math.max(0, Math.sin(distRatio * Math.PI * 1.5)) * 0.25;
          const r = Math.round(lerp(220, 70, blueMix));
          const g = Math.round(lerp(170, 130, blueMix));
          const b = Math.round(lerp(60, 255, blueMix));

          // Alpha
          const a = 0.6 + lum * 0.4;

          setPixel(data, x, y, r, g, b, a);
        }
      }
    }

    function render(time) {
      const data = imageData.data;

      // Fill background (8, 6, 10) fully opaque
      for (let i = 0; i < data.length; i += 4) {
        data[i]     = 8;
        data[i + 1] = 6;
        data[i + 2] = 10;
        data[i + 3] = 255;
      }

      const cx = w / 2;
      const cy = h / 2;
      const radius = Math.min(w, h) * 0.2;
      const crawlOffset = 0;

      renderSphere(imageData, cx, cy, radius, crawlOffset);
      renderStreams(imageData, streams, cx, cy, radius, crawlOffset);

      ctx.putImageData(imageData, 0, 0);

      // Background glow (composited on top via 'lighter')
      ctx.globalCompositeOperation = 'lighter';
      renderGlow(ctx, cx, cy, radius);
      ctx.globalCompositeOperation = 'source-over';

      requestAnimationFrame(render);
    }

    requestAnimationFrame(render);
  </script>
</body>
</html>
